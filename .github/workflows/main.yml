name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]

jobs:

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install safety
        run: |
          pip install safety

      - name: Run scan
        run: safety check || true


  unit-tests:   # ✅ DAPAT NASA LOOB NG "jobs:"
    runs-on: ubuntu-latest
    needs: dependency-scan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=." >> $GITHUB_ENV

      - name: Run tests
        run: |
          pytest Tests -v --cov=App --cov-report=term-missing --cov-report=html --tb=short

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
        
  container-build:
    name: Container Build
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: secure-app:latest
          outputs: type=docker,dest=/tmp/secure-app.tar

      - name: Upload container image
        uses: actions/upload-artifact@v4
        with:
          name: container-image
          path: /tmp/secure-app.tar

  container-scan:
    name: Container Vulnerability Scan
    runs-on: ubuntu-latest
    needs: container-build

    steps:
      - name: Download container image
        uses: actions/download-artifact@v5
        with:
          name: container-image
          path: /tmp

      - name: Run Trivy scan on image tar
        uses: aquasecurity/trivy-action@0.35.0
        with:
          input: /tmp/secure-app.tar
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

  deploy:
    name: Deploy Status
    runs-on: ubuntu-latest
    needs: [dependency-scan, unit-tests, container-scan]
    if: success()

    steps:
      - name: Show deployment readiness
        run: |
          echo "All checks passed."
          echo "Dependency scan completed."
          echo "Unit tests passed."
          echo "Container scan completed."
          echo "Ready for deployment."
